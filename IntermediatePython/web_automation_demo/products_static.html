<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Product Demo - Static</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; color: #1f2937; }
    .product-card { border: 1px solid #d1d5db; border-radius: 6px; padding: 1rem; margin: 1rem 0; max-width: 460px; }
    .price { color: #047857; font-weight: bold; }
    .stock { color: #4b5563; }
  </style>
</head>
<body>
  <h1>Product Catalog</h1>

  <div class="product-card" data-product-id="001">
    <h2>Wireless Mouse</h2>
    <p class="price">$25.99</p>
    <p class="stock">In stock</p>
    <a class="product-link" href="/products/mouse">View details</a>
  </div>

  <div class="product-card" data-product-id="002">
    <h2>Keyboard</h2>
    <p class="price">$45.00</p>
    <p class="stock">In stock</p>
    <a class="product-link" href="/products/keyboard">View details</a>
  </div>

  <div class="product-card" data-product-id="003">
    <h2>USB-C Hub</h2>
    <p class="price">$32.50</p>
    <p class="stock">Low stock</p>
    <a class="product-link" href="/products/usb-c-hub">View details</a>
  </div>
</body>
</html>
